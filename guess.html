<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: "Rubik", sans-serif;
        }

        @media (prefers-color-scheme: dark) {
        	div	{
        		background-color:black;
        		color:white;
        	}
        }

        @media (prefers-color-scheme: light) {
        	div	{
        		background-color:white;
        		color:black;
        	}
        }

        @media screen and (orientation: portrait) {
            body {

            }
        }

    </style>
</head>
<body>

<!-- Button to trigger createOverlay -->
<button onclick="createOverlay()">Create Overlay</button>

<script>
screen.orientation.lock("landscape");
    function createOverlay() {
      var overlay = document.createElement('div');
      overlay.style.height = "200%";
      overlay.style.width = "200%";
      overlay.style.overflow = "hidden";
      overlay.style.top = "0";
      overlay.style.position = "fixed";
      //overlay.style.zIndex = "9999";

      var banner = document.createElement('div');
      banner.style.backgroundColor = "blue";
      banner.style.height = "15%";
      banner.style.width = "100%";
      banner.style.position = "absolute";
      banner.style.top = "0";
      overlay.appendChild(banner);

      var circle = document.createElement('div');
      circle.style.borderRadius = "50%";
      circle.style.border =  "1vw solid blue";
      circle.style.height = "10vw";
      circle.style.width = "10vw";
      circle.style.top = "80%"
      circle.style.left = "50%";
      circle.style.position = "absolute";
      circle.style.transform = "translate(-50%, -50%)";
      banner.appendChild(circle);

      const exitButton = document.createElement('div');
      exitButton.style.top = "30%"
      exitButton.style.left = "3%";
      exitButton.style.position = "absolute";
      exitButton.style.backgroundColor = "blue";
      exitButton.style.fontSize = "150%";
      exitButton.innerText = '< Back';
      exitButton.addEventListener('click', function () {
          document.body.removeChild(overlay);
      });
      banner.appendChild(exitButton);

      document.body.appendChild(overlay);
    }

</script>

</body>
</html>
