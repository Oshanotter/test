<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        #infoPage {
            background-color: green;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        #infoSplit1 {
            background-color: red;

            width: 100vw;
            height: 50vh;
        }

        #infoSplit2 {

            background-color: blue;
            width: 100vw;
            height: 50vh;
        }

        @media (orientation: landscape) {
            #infoPage {
                flex-direction: row;
            }

            #infoSplit1 {
                width: 30vw;
                height: 100vh;
            }

            #infoSplit2 {
                width: 70vw;
                height: 100vh;
            }
        }

        .button {
            border: solid green;
            border-radius: 1vh;
            max-width: 100%;
            text-align: center;
            vertical-align: middle;
            margin: 1vh 1vh 0vh 1vh;
            background-color: yellow;
        }

        #buttonContainer {
            width: 90%;
            margin: auto;
            background-color: orange;
        }
    </style>
    <title>Split Screen</title>
</head>

<body style="width: 100vw; height: 100vh; margin: 0; padding: 0;">
    <div id="infoPage">
        <div id="infoSplit1">
            <h1>Title of Film</h1>
            <p>Sep 20, 1987</p>
            <p>Description of the movie or series. This should be a few sentences long. Some desvriptions are longer than others though.</p>
            <div id="buttonContainer">
                <div id="playButton" class="button" onclick="openPage()">Play</div>
                <div id="resumeButton" class="button">Resume</div>
                <div id="addToListButton" class="button">Add To List</div>
                <div style="display: flex; flex-direction: row; justify-content: space-between;">
                    <div id="stopTrailer" class="button" style="width: calc(50% - 1vh)">Stop Trailer</div>
                    <div id="restartTrailer" class="button" style="width: calc(50% - 1vh)">Restart Trailer</div>
                </div>
                <div id="backButton" class="button">Back</div>
            </div>
        </div>
        <div id="infoSplit2">
            <iframe width="100%" height="100%" id="frame" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>
    <script>
        function openPage() {
            var elm = document.getElementById('frame');
            var url = "https://www.youtube.com/embed/tgbNymZ7vqY?controls=0&modestbranding=1&iv_load_policy=3&autoplay=1";
            elm.src = url;
            elm.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        }
    </script>
</body>

</html>
