<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Clone</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
    }

    .sidebar {
      width: 200px;
      height: 100vh;
      background-color: #333;
      color: #fff;
      float: left;
    }

    .sidebar ul {
      list-style-type: none;
      padding: 0;
    }

    .sidebar ul li {
      padding: 10px;
      cursor: pointer;
    }

    .sidebar ul li.active {
      background-color: #555;
    }

    .main {
      margin-left: 200px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .container img {
      width: 150px;
      margin: 10px;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      display: none;
    }

    .overlay-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #fff;
      padding: 20px;
      border-radius: 5px;
      text-align: center;
    }

    .overlay button {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      background-color: #333;
      color: #fff;
      cursor: pointer;
    }

    .overlay button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <ul>
      <li class="active">Home</li>
      <li>Movies</li>
      <li>TV Shows</li>
    </ul>
  </div>
  
  <div class="main">
    <div class="container"></div>
  </div>

  <div class="overlay">
    <div class="overlay-content">
      <h2 id="title"></h2>
      <p id="overview"></p>
      <button id="addToList">Add To List</button>
      <button id="watchTrailer">Watch Trailer</button>
      <button id="back">Back</button>
    </div>
  </div>

  <script>
    // JavaScript code for fetching data from TMDB API and handling click events
    document.addEventListener('DOMContentLoaded', () => {
      const apiKey = 'YOUR_API_KEY'; // Your TMDB API key
      let currentCategory = 'home';

      function fetchData(url) {
        return fetch(url)
          .then(response => response.json())
          .catch(error => console.error('Error:', error));
      }

      function displayMoviesAndShows(category) {
        let url;
        switch (category) {
          case 'home':
            url = `https://api.themoviedb.org/3/discover/movie?api_key=${apiKey}&language=en-US&sort_by=popularity.desc&include_adult=false`;
            break;
          case 'movies':
            url = `https://api.themoviedb.org/3/discover/movie?api_key=${apiKey}&language=en-US&sort_by=popularity.desc&include_adult=false`;
            break;
          case 'tvShows':
            url = `https://api.themoviedb.org/3/discover/tv?api_key=${apiKey}&language=en-US&sort_by=popularity.desc&include_adult=false`;
            break;
          default:
            url = `https://api.themoviedb.org/3/discover/movie?api_key=${apiKey}&language=en-US&sort_by=popularity.desc&include_adult=false`;
        }

        fetchData(url)
          .then(data => {
            const container = document.querySelector('.container');
            container.innerHTML = ''; // Clear previous content

            data.results.forEach(item => {
              const img = document.createElement('img');
              img.src = `https://image.tmdb.org/t/p/w185${item.poster_path}`;
              img.dataset.id = item.id;
              container.appendChild(img);
            });
          })
          .catch(error => console.error('Error:', error));
      }

      document.querySelector('.main').addEventListener('click', event => {
        if (event.target.tagName === 'IMG') {
          const id = event.target.dataset.id;
          displayDetails(id);
        }
      });

      document.getElementById('addToList').addEventListener('click', () => {
        // Implement functionality for adding to list here
      });

      document.getElementById('watchTrailer').addEventListener('click', () => {
        // Implement functionality for watching trailer here
      });

      document.getElementById('back').addEventListener('click', () => {
        document.querySelector('.overlay').style.display = 'none';
      });

      // Initial fetch for home page (mixed movies and TV shows)
      displayMoviesAndShows('home');

      // Event listeners for sidebar categories
      document.getElementById('home').addEventListener('click', () => {
        currentCategory = 'home';
        displayMoviesAndShows('home');
      });

      document.getElementById('movies').addEventListener('click', () => {
        currentCategory = 'movies';
        displayMoviesAndShows('movies');
      });

      document.getElementById('tvShows').addEventListener('click', () => {
        currentCategory = 'tvShows';
        displayMoviesAndShows('tvShows');
      });
    });
  </script>
</body>
</html>
